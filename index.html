<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marc Laflamme | Media Storage</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        h1 { color: var(--accent); margin-bottom: 10px; }
        p { margin-bottom: 30px; opacity: 0.8; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #334155; transition: transform 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .img-container { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .label { font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        button { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; width: 100%; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h1>Marc Laflamme Asset Library</h1>
    <p>Public storage for professional logos and gaming assets.</p>

    <div class="gallery">
        <div class="card">
            <div class="img-container"><img src="images/newjob.jpg"></div>
            <span class="label">newjob.jpg</span>
            <button onclick="copyLink('images/newjob.jpg')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/Laflamme, Marc_pcp logo.jpeg"></div>
            <span class="label">PCP Logo</span>
            <button onclick="copyLink('images/Laflamme,%20Marc_pcp%20logo.jpeg')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/MarLaf - BusinessLogo 2021 original.PNG"></div>
            <span class="label">Business Logo (Original)</span>
            <button onclick="copyLink('images/MarLaf%20-%20BusinessLogo%202021%20original.PNG')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/MarLaf - BusinessLogo 2021 small.png"></div>
            <span class="label">Business Logo (Small)</span>
            <button onclick="copyLink('images/MarLaf%20-%20BusinessLogo%202021%20small.png')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/MarLaf - BusinessLogo 2021 mini.png"></div>
            <span class="label">Business Logo (Mini)</span>
            <button onclick="copyLink('images/MarLaf%20-%20BusinessLogo%202021%20mini.png')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/marc8484_gamer2025.jpg"></div>
            <span class="label">marc8484_gamer2025.jpg</span>
            <button onclick="copyLink('images/marc8484_gamer2025.jpg')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/marc8484 twitch profile.png"></div>
            <span class="label">twitch profile.png</span>
            <button onclick="copyLink('images/marc8484%20twitch%20profile.png')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/kinling001.png"></div>
            <span class="label">kinling001.png</span>
            <button onclick="copyLink('images/kinling001.png')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/Capture02.PNG"></div>
            <span class="label">Capture02.PNG</span>
            <button onclick="copyLink('images/Capture02.PNG')">Copy Link</button>
        </div>

        <div class="card">
            <div class="img-container"><img src="images/marc8484 logo.jpg"></div>
            <span class="label">marc8484 logo.jpg</span>
            <button onclick="copyLink('images/marc8484%20logo.jpg')">Copy Link</button>
        </div>
    </div>

    <script>
        function copyLink(path) {
            const fullUrl = window.location.origin + window.location.pathname + path;
            navigator.clipboard.writeText(fullUrl);
            alert("URL Copied to Clipboard!");
        }
    </script>

</body>
</html>
