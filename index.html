<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marc8484 Media Storage</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { border: 1px solid #333; padding: 10px; border-radius: 8px; background: #1e1e1e; }
        img { max-width: 200px; display: block; border-radius: 4px; margin-bottom: 10px; }
        a { color: #00aaff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Marc8484 Asset Library</h1>
    
    <div class="gallery">
        <div class="card">
            <img src="images/kinling001.png" alt="Kinling">
            <a href="images/kinling001.png" target="_blank">kinling001.png</a>
        </div>

        <div class="card">
            <img src="images/marc8484 logo.jpg" alt="Logo">
            <a href="images/marc8484 logo.jpg" target="_blank">marc8484 logo.jpg</a>
        </div>

        <div class="card">
            <img src="images/marc8484 twitch profile.png" alt="Twitch Profile">
            <a href="images/marc8484 twitch profile.png" target="_blank">twitch profile.png</a>
        </div>

        <div class="card">
            <img src="images/marc8484_gamer2025.jpg" alt="Gamer 2025">
            <a href="images/marc8484_gamer2025.jpg" target="_blank">marc8484_gamer2025.jpg</a>
        </div>
    </div>

</body>
</html>
